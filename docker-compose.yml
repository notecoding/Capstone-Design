services:
  redis:
    image: redis:7
    container_name: capstone_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend_api
    container_name: capstone_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend_api/.env
    depends_on:
      - redis
    volumes:
      - ./backend_api/storage:/app/storage
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend_api
    container_name: capstone_worker
    env_file:
      - ./backend_api/.env
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend_api/storage:/app/storage
    command: celery -A app.worker.app worker --loglevel=info --pool=solo